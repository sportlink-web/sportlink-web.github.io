    <title>Page Not Found</title>
    <script>
      (function () {
        var path = window.location.pathname || "";
        if (path === "/events" || path === "/events/" || path.indexOf("/events/") === 0) {
          window.location.replace("/");
        }
      })();
    </script>
    <style>

        display: grid;

        background: #f8fafc;
        color: #0f172a;
      }
      main {
        text-align: center;
        padding: 24px;
      }
      a {
        color: #2563eb;
      }
    </style>
